name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Compilar (typecheck)
        run: npm run compile
      - name: Tests
        run: npm test
      - name: Empaquetar (.vsix)
        run: npx --yes @vscode/vsce package -o lang-chat.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: lang-chat.vsix
